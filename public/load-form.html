<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Paste-a-Load</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0b1220">
  <style>
    body { font-family: system-ui, Arial, sans-serif; background:#0b1220; color:#e8eefc; padding:24px; }
    form { max-width: 980px; margin:auto; display:grid; gap:12px; grid-template-columns: repeat(12, 1fr); }
    h1 { grid-column: 1 / -1; font-size: 20px; margin: 0 0 8px; }
    label { font-size: 12px; color:#b7c4e0; }
    input, select, textarea {
      width: 100%; padding:10px; border-radius:10px; border:1px solid #1f2a44; background:#0f1730; color:#e8eefc;
    }
    .col-12{ grid-column:1/-1 } .col-6{ grid-column: span 6 } .col-4{ grid-column: span 4 } .col-3{ grid-column: span 3 }
    button { padding:12px 16px; border:0; border-radius:12px; background:#3b82f6; color:#fff; font-weight:700; cursor:pointer; }
    .row{ display:contents } .actions{ grid-column:1/-1; display:flex; gap:8px; flex-wrap: wrap }
    .ghost{ background:#18213f }
  </style>
</head>
<body>
  <form id="f">
    <h1>Paste-a-Load (VA)</h1>

    <div class="row col-3">
      <label>Secret</label>
      <input name="secret" required placeholder="FORM_SECRET"/>
    </div>
    <div class="row col-3">
      <label>Driver target</label>
      <select name="driver">
        <option value="">Smart route</option>
        <option value="A">Driver A</option>
        <option value="B">Driver B</option>
      </select>
    </div>
    <div class="row col-6">
      <label>Load ID (optional)</label>
      <input name="loadId" placeholder="e.g. TQL 33061848"/>
    </div>

    <div class="row col-12">
      <label>Raw paste (copy from board/email, drop it here)</label>
      <textarea id="raw" name="raw" rows="6" placeholder="Paste the load text here…"></textarea>
    </div>

    <div class="actions">
      <button type="button" id="quickFill" class="ghost">📋 QuickFill from Clipboard</button>
      <button type="button" id="parse">🔎 Parse to fields</button>
      <button type="submit">🚀 Send to Telegram</button>
    </div>

    <div class="row col-6"><label>Broker</label><input name="broker"/></div>
    <div class="row col-3"><label>Phone</label><input name="brokerPhone"/></div>
    <div class="row col-3"><label>Email</label><input name="brokerEmail" type="email"/></div>

    <div class="row col-12"><label>Link</label><input name="link"/></div>

    <div class="row col-6"><label>Origin (City, ST)</label><input name="origin"/></div>
    <div class="row col-6"><label>Destination (City, ST)</label><input name="destination"/></div>

    <div class="row col-4"><label>Pickup Date</label><input name="pickupDate"/></div>
    <div class="row col-4"><label>Miles</label><input name="miles" inputmode="numeric"/></div>
    <div class="row col-4"><label>Deadhead</label><input name="deadhead" inputmode="numeric"/></div>

    <div class="row col-4"><label>Equipment</label>
      <select name="equipment"><option>Straight Box Truck</option><option>Sprinter</option><option>Other</option></select>
    </div>
    <div class="row col-4"><label>Feet</label><input name="feet" inputmode="numeric"/></div>
    <div class="row col-4"><label>Weight (lbs)</label><input name="weight" inputmode="numeric"/></div>

    <div class="row col-4"><label>Rate ($)</label><input name="rate" inputmode="numeric"/></div>
    <div class="row col-4"><label>RPM ($/mi)</label><input name="rpm" inputmode="numeric"/></div>

    <div class="row col-12"><label>Notes</label><textarea name="notes" rows="3"></textarea></div>
  </form>

  <script>
    const f = document.getElementById('f');
    const rawEl = document.getElementById('raw');

    async function parseRawLocally(raw) {
      const body = { secret: f.secret.value || 'x', raw };
      const r = await fetch('/api/load-intake', {
        method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)
      });
      // We sent it—BUT for "Parse to fields" UX we do a local regex pass too:
      // Pull back out of the raw (client-side mirror of server parser)
      const text = raw || '';
      const pick = re => (text.match(re)?.[1] || '').trim();
      f.broker.value      = pick(/(?:Broker|Company|Carrier)[:\s]*([A-Za-z0-9 .,&'/-]+)/i);
      f.brokerPhone.value = pick(/(?:Phone|Tel|Contact)[:\s]*([+()0-9 \-]+)/i);
      f.brokerEmail.value = pick(/([A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,})/i);
      f.link.value        = pick(/(https?:\/\/[^\s>]+)/i);
      f.origin.value      = pick(/(?:Origin|Pickup|From|PU)[:\s]*([A-Za-z .'-]+,\s*[A-Z]{2})/i);
      f.destination.value = pick(/(?:Destination|To|Dest)[:\s]*([A-Za-z .'-]+,\s*[A-Z]{2})/i);
      f.pickupDate.value  = pick(/(?:Pickup|PU Date|Date)[:\s]*([A-Za-z0-9\-\/, ]+)/i);
      f.feet.value        = (pick(/(?:Length|Ft|Feet)[:\s]*([0-9.]+)/i) || '');
      f.weight.value      = (pick(/(?:Weight|Wgt|lbs)[:\s]*([0-9,\.]+)/i) || '').replace(/,/g,'');
      f.miles.value       = (pick(/(?:Miles|mi)[:\s]*([0-9,\.]+)/i) || '').replace(/,/g,'');
      f.deadhead.value    = (pick(/(?:DH|Deadhead)[:\s]*([0-9,\.]+)/i) || '').replace(/,/g,'');
      f.rate.value        = (pick(/(?:Rate|Pay|\$)[:\s]*\$?([0-9,\.]+)/i) || '').replace(/,/g,'');
      f.rpm.value         = (pick(/(?:RPM|Rate\/mi)[:\s]*\$?([0-9,\.]+)/i) || '').replace(/,/g,'');
    }

    document.getElementById('parse').onclick = () => parseRawLocally(rawEl.value);

    document.getElementById('quickFill').onclick = async () => {
      try {
        const txt = await navigator.clipboard.readText();
        rawEl.value = txt || rawEl.value;
        await parseRawLocally(rawEl.value);
      } catch { alert('Clipboard blocked. Paste manually, then click Parse.'); }
    };

    // If bookmarklet provided #raw=…
    const hashRaw = new URLSearchParams(location.hash.slice(1)).get('raw');
    if (hashRaw) { rawEl.value = decodeURIComponent(hashRaw); parseRawLocally(rawEl.value); }

    f.addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(f).entries());
      const r = await fetch('/api/load-intake', {
        method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(data)
      });
      const j = await r.json();
      if (j.ok) alert(`Sent to: ${j.routed?.join(', ') || 'drivers'}`);
      else alert('Error: ' + (j.error || 'unknown'));
    });
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(()=>{});
    }
  </script>
</body>
</html>
